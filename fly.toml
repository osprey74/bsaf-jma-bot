# fly.toml app configuration file generated for bsaf-jma-bot on 2026-03-01T14:48:16+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bsaf-jma-bot'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[env]
  DATA_DIR = '/data'
  LOG_LEVEL = 'INFO'
  NODE_ENV = 'production'
  POLL_INTERVAL_MS = '45000'

[[mounts]]
  source = 'bsaf_data'
  destination = '/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

# Restart policy: limit retries to avoid rate-limit amplification
[[restart]]
  policy = 'on-failure'
  retries = 5
